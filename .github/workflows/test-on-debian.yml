name: Test Nipe on Debian

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-debian:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Debian smoke test
        run: ./.github/scripts/run-distro-smoke-test.sh debian
