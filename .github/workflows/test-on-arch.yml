name: Test Nipe on Arch Linux

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-arch:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run Arch smoke test
        run: ./.github/scripts/run-distro-smoke-test.sh arch
